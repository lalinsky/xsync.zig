name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        zig: ["0.16.0", "master"]
        mode: [debug, release]
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig }}
      - run: zig build test --summary all ${{ matrix.mode == 'release' && '-Doptimize=ReleaseSafe' || '' }}
        timeout-minutes: 10
